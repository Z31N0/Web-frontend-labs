<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Shopping Cart</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
<header>
    <h1>Mini Shopping Cart</h1>
</header>
<main>
    <section class="product-catalog">
        <h2>Products</h2>
        <div class="products">
            <!-- Example Product -->
            <div class="product" data-id="1" data-name="Laptop" data-price="999.99">
                <h3>Laptop</h3>
                <p>Price: $999.99</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            <div class="product" data-id="2" data-name="Smartphone" data-price="499.99">
                <h3>Smartphone</h3>
                <p>Price: $499.99</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            <div class="product" data-id="3" data-name="Headphones" data-price="199.99">
                <h3>Headphones</h3>
                <p>Price: $199.99</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
        </div>
    </section>
    <section class="shopping-cart">
        <h2>Your Cart</h2>
        <ul class="cart-items">
            <!-- Cart items will be added dynamically -->
        </ul>
        <div class="cart-summary">
            <p>Total: $<span class="cart-total">0.00</span></p>
            <button class="clear-cart">Clear Cart</button>
        </div>
    </section>
</main>
<footer>
    <p>© 2025 Mini Shopping Cart</p>
</footer>
<script src="script.js"></script>
</body>
</html>
