<body>
  <header>
    <div id="logo"></div>
    <nav>
      <ul>
        <li><a href="#">Shop</a></li>

        <li><a href="#">Deals</a></li>
        <li><h1>Account</h1></li>
      </ul>
    </nav>
  </header>
  <main>
    <div class="left-panel"></div>
    <section class="right-panel" id="log-in">
      <h3>Log In</h3>
      <form action="login.php" method="POST">
        <label for="email">Your email</label>
        <input id="email" type="email">
        <label for="password">Your password</label>
        <input id="password" type="password">
        <button type="submit">Log in</button>
      </form>
      <p class="message">Not a member? <a href="create.html" class="toggle-link">Create account</a></p>
    </section>
    <section class="right-panel hidden" id="register">
      <h3>Create account</h3>
      <form action="register.php" method="POST">
        <label for="email-register">Your email</label>
        <input id="email-register" type="email">
        <label for="password-register">Your password</label>
        <input id="password-register" type="password">
        <label for="password-repeat">Repeat your password</label>
        <input id="password-repeat" type="password">
        <button type="submit">Register</button>
      </form>
      <p class="message">Already a member? <a href="login.html" class="toggle-link">Log in</a></p>
    </section>
